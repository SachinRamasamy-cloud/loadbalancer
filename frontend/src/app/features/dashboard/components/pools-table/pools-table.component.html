<article class="panel">
  <header>
    <div>
      <h2>Server Pools Performance</h2>
      <p>Current throughput and health</p>
    </div>
  </header>

  <div class="table-scroll">
    <table>
      <thead>
        <tr>
          <th>Pool Name</th>
          <th>Status</th>
          <th>Servers</th>
          <th>Throughput</th>
          <th>Error Rate</th>
          <th aria-label="Actions"></th>
        </tr>
      </thead>
      <tbody>
        @for (row of rows; track row.name) {
          <tr>
            <td><strong>{{ row.name }}</strong></td>
            <td>
              <span class="status-dot" [style.background]="row.statusColor"></span>
            </td>
            <td>{{ row.servers }}</td>
            <td>{{ row.throughput }}</td>
            <td>{{ row.errorRate }}</td>
            <td>
              <div class="actions">
                <button type="button" [attr.aria-label]="'View ' + row.name">
                  <app-icon name="eye" [size]="18" />
                </button>
                <button type="button" [attr.aria-label]="'Edit ' + row.name">
                  <app-icon name="edit" [size]="18" />
                </button>
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</article>
