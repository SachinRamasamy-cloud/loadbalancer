<article class="panel chart-panel">
  <header>
    <div>
      <h2>Traffic Distribution</h2>
      <p>Last 24 hours</p>
    </div>
    <button type="button">24 hours⌄</button>
  </header>

  <div class="chart-wrap">
    <svg
      viewBox="0 0 360 220"
      preserveAspectRatio="none"
      role="img"
      aria-label="Traffic distribution over the last 24 hours"
    >
      <g class="grid">
        <path d="M0 20H340M0 70H340M0 120H340M0 170H340" />
        <path d="M40 0V180M100 0V180M160 0V180M220 0V180M280 0V180" />
      </g>

      @for (item of series; track item.name) {
        <path
          class="traffic-line"
          [attr.d]="toPath(item.points)"
          [attr.stroke]="item.color"
        />
      }
    </svg>

    <div class="axis-labels">
      <span>00:00</span>
      <span>04:00</span>
      <span>08:00</span>
      <span>12:00</span>
      <span>16:00</span>
      <span>20:00</span>
    </div>
  </div>

  <div class="legend">
    @for (item of series; track item.name) {
      <span>
        <i [style.background]="item.color"></i>
        {{ item.name }}
      </span>
    }
  </div>
</article>
