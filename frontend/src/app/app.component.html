<div class="min-h-screen bg-[#f3f5f9]">
  <app-sidebar
    [mobileOpen]="sidebarOpen"
    (closeMobile)="closeSidebar()"
  ></app-sidebar>

  <!-- Mobile sidebar button -->
  <button
    type="button"
    aria-label="Open navigation"
    class="fixed left-4 top-4 z-30 inline-flex h-10 w-10
           items-center justify-center rounded-lg border border-slate-200
           bg-white text-slate-700 shadow-sm lg:hidden"
    (click)="toggleSidebar()"
  >
    <span class="sr-only">Open sidebar</span>

    <svg
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      class="h-5 w-5"
      aria-hidden="true"
    >
      <path
        stroke-linecap="round"
        d="M4 6h16M4 12h16M4 18h16"
      />
    </svg>
  </button>

  <!-- Main application content -->
  <main class="min-h-screen lg:pl-[230px]">
    <router-outlet></router-outlet>
  </main>
</div>
