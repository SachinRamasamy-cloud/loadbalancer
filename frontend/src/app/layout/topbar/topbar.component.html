<header class="topbar">
  <button
    class="topbar__menu"
    type="button"
    aria-label="Open navigation"
    (click)="menuRequested.emit()"
  >
    <app-icon name="menu" [size]="23" />
  </button>

  <label class="search">
    <app-icon name="search" [size]="22" />
    <input
      type="search"
      placeholder="Search pools, servers..."
      aria-label="Search pools and servers"
    >
  </label>

  <div class="topbar__actions">
    <button class="icon-button notification-button" type="button" aria-label="Notifications">
      <app-icon name="bell" [size]="23" />
      <span class="notification-button__dot"></span>
    </button>

    <div class="profile" aria-label="Current user">
      <span class="profile__avatar">JD</span>
      <strong>John Doe</strong>
    </div>

    <button class="logout-button" type="button">
      <span>Logout</span>
      <app-icon name="logout" [size]="18" />
    </button>
  </div>
</header>
