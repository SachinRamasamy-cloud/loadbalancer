<article class="card status-card">
  <header>
    <div>
      <h2>Global Status</h2>
      <p>Overall healthy indicator</p>
    </div>
  </header>

  <div class="status-card__check">
    <app-icon name="check" [size]="28" />
  </div>

  <div class="status-card__message">
    <span class="status-card__small-check">
      <app-icon name="check" [size]="16" />
    </span>
    <strong>All Systems Operational</strong>
  </div>
</article>
