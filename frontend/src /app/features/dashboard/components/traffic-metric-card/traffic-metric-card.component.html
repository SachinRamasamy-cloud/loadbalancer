<article class="card">
  <header class="card__header">
    <h2>Total Traffic</h2>
    <button type="button" aria-label="Traffic options">
      <app-icon name="more" [size]="21" />
    </button>
  </header>

  <div class="metric">
    <strong>{{ trafficGbps }} Gbps</strong>
    <span>↗</span>
  </div>

  <svg
    class="sparkline"
    viewBox="0 0 250 104"
    preserveAspectRatio="none"
    role="img"
    aria-label="Traffic trend chart"
  >
    <path class="grid" d="M0 18H250M0 52H250M0 86H250" />
    <path class="area" d="M0 92C28 72 31 38 56 48S91 74 116 56 151 12 171 34s29 58 79 10V104H0Z" />
    <path class="line teal" d="M0 92C28 72 31 38 56 48S91 74 116 56 151 55 171 47s29 25 79-32" />
    <path class="line purple" d="M0 95C30 76 48 70 70 74s33 18 53-2 31-65 55-44 27 61 72 43" />
  </svg>
</article>
